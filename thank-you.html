<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquiry Received | Author’ Face</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f1113; color: #e5e7eb; margin: 0; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .serif { font-family: 'Playfair Display', serif; }
        #motion-canvas { position: absolute; top: 0; left: 0; z-index: 1; width: 100%; height: 100%; }
        .content-card { position: relative; z-index: 10; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gold-glow { box-shadow: 0 0 50px rgba(212, 175, 55, 0.15); }
    </style>
</head>
<body>

    <canvas id="motion-canvas"></canvas>

    <div class="content-card p-12 md:p-20 rounded-3xl text-center max-w-2xl mx-6 gold-glow">
        <div class="text-amber-500 text-6xl mb-8">✧</div>
        <h1 class="text-4xl md:text-6xl serif italic mb-6">The message is away.</h1>
        <p class="text-lg text-gray-400 mb-10 leading-relaxed font-light">
            Thank you for reaching out, Author. Sandra Caleb Williams has been notified and is currently reviewing your digital footprint and literary vision.
        </p>
        <div class="space-y-4">
            <p class="text-xs uppercase tracking-[0.4em] text-amber-500 font-bold mb-8">Next Step: Human Response within 24 Hours</p>
            <a href="index.html" class="inline-block border border-white/20 px-10 py-4 rounded-full text-xs font-black uppercase tracking-widest hover:bg-white hover:text-black transition-all duration-500">
                Return to Library
            </a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.querySelector('#motion-canvas'), alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 3000;
        const posArray = new Float32Array(starsCount * 3);

        for(let i=0; i < starsCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 15;
        }

        starsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const starsMaterial = new THREE.PointsMaterial({ size: 0.005, color: '#D4AF37', transparent: true, opacity: 0.8 });
        const starMesh = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(starMesh);

        camera.position.z = 2;

        function animate() {
            requestAnimationFrame(animate);
            starMesh.rotation.y += 0.0005;
            starMesh.rotation.x += 0.0002;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
